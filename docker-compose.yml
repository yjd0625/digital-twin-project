# 数字孪生全栈 Docker 编排（开源友好版）
# 用法（在本文件所在目录）：
#   1) 复制环境变量模板并填写： cp .env.example .env   （详见 README「配置令牌」一节）
#   2) 启动： docker compose up -d
#   看日志： docker compose logs -f <服务名>     例：docker compose logs -f backend
#   停止： docker compose down                   （加 -v 会删 redis/explorer 数据卷）
# 各服务端口（均映射到宿主，浏览器从宿主 localhost 访问）：
#   frontend  :8080(容器5173)   backend :8300(/ws)   influxdb3 :18080   explorer :8888   redis :6379
#   注：宿主 5173/5180 均落在 Windows/WSL2 保留段 5170-5269（excluded port range），Docker 映射报
#       access forbidden；故前端宿主映射改用 8080（不在任何保留段）。容器内仍是 5173，HMR/WS 不受影响。
# 说明：前端是浏览器应用，连 ws://localhost:8300/ws；后端把 8300 发布到宿主，故代码无需改。
#      后端（Docker 内，作为 TCP 客户端）连宿主上的数据源走 host.docker.internal:30000，要求数据源仿真器在宿主监听 0.0.0.0:30000（非仅 127.0.0.1）。数据源可晚于后端启动/随时断开，后端每 3s 自动重连。
#      数据全部用「项目内相对路径 + 命名卷」，不依赖任何本机绝对路径，clone 后在任意平台均可直接 up。

name: digital-twin

services:
  # ---------- 消息总线 ----------
  redis:
    image: redis:7
    container_name: dt-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - dt-net
    restart: unless-stopped

  # ---------- 时序数据库 ----------
  influxdb3:
    image: influxdb:3-core
    container_name: dt-influxdb3
    ports:
      - "18080:18080"
    environment:
      # 注意：INFLUXDB3_AUTH_TOKEN 仅用于 CLI 客户端认证，serve 不会用它预设 admin token。
      # 真正的服务端 admin token 由 ./influxdb3/entrypoint.sh 通过 --admin-token-file 预设，
      # 其值取自同一个 .env 变量，故 InfluxDB / Explorer / backend 三方 token 始终一致。
      INFLUXDB3_AUTH_TOKEN: ${INFLUXDB3_AUTH_TOKEN}
      NODE_ID: ${NODE_ID}
    command: ["sh", "/entrypoint.sh"]
    volumes:
      # 项目自包含数据目录（相对路径，跨平台；不依赖本机 D:\influxdb3）
      - ./.docker/influxdb3-data:/var/lib/influxdb3/data
      - ./.docker/influxdb3-plugins:/var/lib/influxdb3/plugins
      # entrypoint 脚本（不含任何 token，仅从环境变量生成 token 文件）
      - ./influxdb3/entrypoint.sh:/entrypoint.sh
    networks:
      - dt-net
    restart: unless-stopped

  # ---------- InfluxDB 管理 UI ----------
  explorer:
    image: influxdata/influxdb3-ui:1.9.0
    container_name: dt-explorer
    ports:
      - "8888:8080"
    environment:
      SESSION_SECRET_KEY: ${EXPLORER_SESSION_SECRET_KEY}
      DEFAULT_API_TOKEN: ${INFLUXDB3_AUTH_TOKEN}
      # 浏览器侧经宿主网关访问 InfluxDB（Explorer UI 在用户浏览器运行，host.docker.internal 指向宿主）
      DEFAULT_INFLUX_SERVER: http://host.docker.internal:18080
      DEFAULT_SERVER_NAME: Local InfluxDB 3
      DEFAULT_INFLUX_DATABASE: ""
    command: ["--mode=admin"]
    volumes:
      # 不 bind 本机 config；token/server 由上方环境变量注入。会话数据用命名卷持久化
      - explorer-db:/db
    depends_on:
      - influxdb3
    networks:
      - dt-net
    restart: unless-stopped

  # ---------- Python 后端（FastAPI）----------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dt-backend
    ports:
      - "8300:8300"
    environment:
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: 8300
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PROTOCOL: 2
      # 连宿主上的数据源（默认 Python 实时仿真器，监听 30000）
      # 注：Plant Simulation 已作为分析外挂断开实时架构，仅订阅 source/state 只读消费。
      SOURCE_HOST: host.docker.internal
      SOURCE_PORT: 30000
      INFLUXDB_ENABLED: ${INFLUXDB_ENABLED:-false}
      INFLUXDB_URL: http://influxdb3:18080
      INFLUXDB_TOKEN: ${INFLUXDB3_AUTH_TOKEN}
      INFLUXDB_DATABASE: digital_twin
      PYTHONUNBUFFERED: "1"
    volumes:
      # 挂载源码实现热重载（依赖已装在镜像内）
      - ./backend/src:/app/src
    depends_on:
      - redis
      - influxdb3
    # 跨平台兼容：让容器内可解析 host.docker.internal（Linux 默认不解析，Windows/mac 已内置）
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - dt-net
    restart: unless-stopped

  # ---------- Vite 前端（开发模式 + HMR）----------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dt-frontend
    ports:
      # 宿主 8080 绕开 Windows/WSL2 的排除端口范围（5173/5180 都在保留段 5170-5269 内）
      - "8080:5173"
    environment:
      # 容器内监听bind挂载的文件需轮询
      CHOKIDAR_USEPOLLING: "1"
      CHOKIDAR_INTERVAL: "100"
    volumes:
      # 仅挂载源码与配置，node_modules 保留在镜像内
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
    depends_on:
      - backend
    networks:
      - dt-net
    restart: unless-stopped

volumes:
  redis-data:
  explorer-db:

networks:
  dt-net:
    driver: bridge
