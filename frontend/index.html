<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PlantSimulation 数字孪生</title>
    <style>
        html, body { margin: 0; overflow: hidden; width: 100%; height: 100%; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-family: Arial, sans-serif;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 5px;
            pointer-events: none;
            z-index: 100;
        }
        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 15px;
        }
        #controls button {
            padding: 10px 25px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        #controls button:hover { transform: scale(1.05); }
        #btn-start { background: #4CAF50; color: white; }
        #btn-stop  { background: #f44336; color: white; }
        #btn-speed { background: #2196F3; color: white; }
    </style>
</head>
<body>
    <div id="info">⏳ 等待数据...</div>
    <div id="controls">
        <button id="btn-start">▶ 启动仿真</button>
        <button id="btn-stop">⏸ 暂停仿真</button>
        <button id="btn-speed">⚡ 加速</button>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
